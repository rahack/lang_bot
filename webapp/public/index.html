<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>lang_bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="modes" id="modes">
    <button class="mode" data-mode="translate">/translate</button>
    <button class="mode" data-mode="chat">/chat</button>
    <button class="mode" data-mode="check">/check</button>
  </div>

  <div class="chat" id="chat"></div>

  <form class="composer" id="composer">
    <textarea id="input" rows="1" placeholder="Сообщение…" autocomplete="off"></textarea>
    <button type="submit" id="send" aria-label="Send">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5"/>
        <path d="M5 12l7-7 7 7"/>
      </svg>
    </button>
  </form>

  <script src="app.js"></script>
</body>
</html>
